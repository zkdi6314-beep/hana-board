            if(s2===kakao.maps.services.Status.OK&&r2[0]){cache[n.addr]={lat:+r2[0].y,lng:+r2[0].x};ok++;add('ok','✔ '+n.name+' (주소)');}
            else{no++;add('no','✘ '+n.name+' — 못 찾음');}
            setTimeout(step,60);
          });
        }
      });
    })();
  };
});
</script>
