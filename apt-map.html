<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신축 아파트 영업지도</title>
<link rel="manifest" href="./apt.webmanifest">
<meta name="theme-color" content="#1F4E78">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{box-sizing:border-box;}
html,body{margin:0;height:100%;font-family:'맑은 고딕','Malgun Gothic',system-ui,sans-serif;color:#1d2733;}
#bar{position:fixed;top:0;left:0;right:0;height:54px;background:#1F4E78;color:#fff;display:flex;align-items:center;gap:8px;padding:0 12px;z-index:100;}
#bar b{font-size:15px;white-space:nowrap;}
select,button{font-size:15px;padding:8px 10px;border:none;border-radius:7px;font-family:inherit;font-weight:700;cursor:pointer;}
select{background:#fff;color:#1d2733;}
#back{background:rgba(255,255,255,.2);color:#fff;display:none;}
#cnt{margin-left:auto;font-size:13px;opacity:.92;white-space:nowrap;}
#prog{position:fixed;top:54px;left:0;right:0;background:#fff8ee;color:#C77800;font-size:12px;padding:6px 12px;z-index:90;display:none;}
#hint{position:fixed;top:54px;left:0;right:0;background:#eaf1fb;color:#1F4E78;font-size:13px;font-weight:700;padding:7px 12px;z-index:89;text-align:center;}
#map{position:absolute;top:54px;left:0;right:0;bottom:0;}
#legend{position:fixed;bottom:14px;left:14px;background:#fff;border:1px solid #e3e8ef;border-radius:8px;padding:7px 11px;font-size:12px;z-index:80;box-shadow:0 2px 8px rgba(0,0,0,.15);}
#legend .d{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:4px;vertical-align:-1px;}
#err{position:fixed;inset:0;background:rgba(20,30,45,.6);display:none;align-items:center;justify-content:center;z-index:200;}
#err .b{background:#fff;border-radius:12px;padding:22px;max-width:440px;font-size:14px;line-height:1.7;}
#err h3{margin:0 0 8px;color:#B42318;}
.gub{background:#1F4E78;border:2px solid #fff;border-radius:22px;padding:6px 12px;font-size:13px;font-weight:800;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer;white-space:nowrap;}
.gub:hover{background:#2c6ba8;}
.apt{display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap;}
.apt .dot{width:14px;height:14px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5);flex:none;}
.apt .t{border:2px solid #fff;border-radius:7px;padding:3px 8px;font-size:12.5px;font-weight:800;color:#fff;box-shadow:0 2px 5px rgba(0,0,0,.4);}
.iw{padding:12px 14px;font-size:13px;line-height:1.7;min-width:190px;}
.iw b{font-size:15px;}
.iw .tag{display:inline-block;font-size:11px;font-weight:800;padding:2px 7px;border-radius:20px;margin-left:4px;}
.iw a{display:inline-block;margin-top:7px;margin-right:6px;padding:7px 11px;border-radius:6px;text-decoration:none;font-weight:700;font-size:12px;}
.iw .c{background:#1F4E78;color:#fff;} .iw .k{background:#eef1f5;color:#1F4E78;}
</style>
</head>
<body>
<div id="bar">
  <b>🏢 신축 아파트</b>
  <select id="reg"><option>서울</option><option>경기</option><option>인천</option></select>
  <select id="gb"><option value="전체">전체</option><option value="신규">🟣신규</option><option value="거래이력(휴면)">🟠휴면</option><option value="거래중">🟢거래중</option></select>
  <button id="back">← 구 전체보기</button>
  <button id="grab" style="background:#C77800;color:#fff">📥 좌표수집(1회)</button>
  <span id="cnt"></span>
</div>
<div id="prog"></div>
<div id="hint">지도에서 <b>구를 클릭</b>하면 그 동네 아파트가 펼쳐집니다</div>
<div id="map"></div>
<div id="legend"><span class="d" style="background:#177245"></span>거래중 <span class="d" style="background:#C77800;margin-left:8px"></span>휴면 <span class="d" style="background:#5b3fb0;margin-left:8px"></span>신규</div>
<div id="err"><div class="b"><h3>지도 로드 실패</h3>카카오 개발자 사이트 → 내 앱 → <b>플랫폼</b> → <b>Web 플랫폼 등록</b>에<br>아래 주소를 추가해 주세요:<br><br><code id="origin"></code><br><br>로컬 파일로 여실 땐 <code>http://localhost</code> 도 함께 등록해 보세요.</div></div>

const fmt=d=>{d=(d||'').replace(/\D/g,'');if(!d)return '';if(d.startsWith('02'))return d.length>=9?'02-'+d.slice(2,d.length-4)+'-'+d.slice(-4):d;if(d.length===11)return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);if(d.length===10)return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);if(d.length===8)return d.slice(0,4)+'-'+d.slice(4);return d;};
const won=n=>Number(n||0).toLocaleString('ko-KR');
const short=g=>g==='거래이력(휴면)'?'휴면':g;
const COL={'거래중':'#177245','거래이력(휴면)':'#C77800','신규':'#5b3fb0'};
const TG={'거래중':'background:#e3f3ea;color:#177245','거래이력(휴면)':'background:#fcefd9;color:#C77800','신규':'background:#ece5fb;color:#5b3fb0'};
const FULL={'서울':'서울특별시','경기':'경기도','인천':'인천광역시'};
const CK='kakao_geo_apt_v1', GK='kakao_geo_gu_v1';
let cache={},gcache={};
try{cache=JSON.parse(localStorage.getItem(CK)||'{}');}catch(e){}
try{gcache=JSON.parse(localStorage.getItem(GK)||'{}');}catch(e){}
document.getElementById('origin').textContent=location.origin||'file://';
const regSel=document.getElementById('reg'),gbSel=document.getElementById('gb'),prog=document.getElementById('prog'),hint=document.getElementById('hint'),backBtn=document.getElementById('back'),cntEl=document.getElementById('cnt');
let map,geocoder,iw,overlays=[],job=0,curGu='';
const filt=()=>REC.filter(x=>x[1]===regSel.value&&(gbSel.value==='전체'||x[0]===gbSel.value));
function guCounts(){const c={};filt().forEach(x=>c[x[2]]=(c[x[2]]||0)+1);return c;}
function clear(){overlays.forEach(o=>o.setMap(null));overlays=[];if(iw)iw.close();}
function fit(pts){ if(!pts.length)return; const b=new kakao.maps.LatLngBounds(); pts.forEach(p=>b.extend(new kakao.maps.LatLng(p[0],p[1]))); map.setBounds(b,60,60,60,60); }
// ── 구 개요
function drawGu(){
  clear(); const c=guCounts(), pts=[];
  for(const g in c){
    const key=FULL[regSel.value]+' '+g, p=gcache[key];
    if(!p||!p.lat) continue;
    const el=document.createElement('div');
    el.className='gub'; el.textContent=g+' '+c[g];
    el.onclick=()=>{curGu=g;backBtn.style.display='block';hint.style.display='none';loadApts();};
    const ov=new kakao.maps.CustomOverlay({position:new kakao.maps.LatLng(p.lat,p.lng),content:el,yAnchor:0.5,clickable:true});
    ov.setMap(map); overlays.push(ov); pts.push([p.lat,p.lng]);
  }
  cntEl.textContent=Object.keys(c).length+'개 구 · '+filt().length+'곳';
  fit(pts);
}
function loadGu(){
  const my=++job; curGu=''; backBtn.style.display='none'; hint.style.display='block';
  drawGu();
  const c=guCounts(), todo=Object.keys(c).filter(g=>!(FULL[regSel.value]+' '+g in gcache));
  if(!todo.length){prog.style.display='none';return;}
  let i=0;
  (function step(){
    if(my!==job) return;
    if(i>=todo.length){prog.style.display='none';localStorage.setItem(GK,JSON.stringify(gcache));drawGu();return;}
    prog.style.display='block'; prog.textContent='구 위치 확인 중… '+(i+1)+'/'+todo.length;
    const key=FULL[regSel.value]+' '+todo[i]; i++;
    geocoder.addressSearch(key,(res,st)=>{
      gcache[key]=(st===kakao.maps.services.Status.OK&&res[0])?{lat:+res[0].y,lng:+res[0].x}:null;
      drawGu(); setTimeout(step,60);
    });
  })();
}
// ── 아파트 상세
function drawApts(){
  clear(); const list=filt().filter(x=>x[2]===curGu), pts=[];
  for(const x of list){
    const c=cache[x[4]]; if(!c||!c.lat) continue;
    const el=document.createElement('div'); el.className='apt';
    el.innerHTML='<span class="t" style="background:'+(COL[x[0]]||'#5b3fb0')+'">'+x[3]+'</span>';
    el.onclick=()=>{
      const ph=fmt(x[8]);
      iw.setContent('<div class="iw"><b>'+x[3]+'</b><span class="tag" style="'+TG[x[0]]+'">'+short(x[0])+'</span><br>'
        +won(x[6])+'세대 · '+x[5]+'년'+(x[7]?' · 최근거래 '+x[7]:'')+'<br>'+x[4]
        +'<br>'+(ph?'<a class="c" href="tel:'+ph+'">📞 '+ph+'</a>':'')
        +'<a class="k" target="_blank" href="https://map.kakao.com/link/search/'+encodeURIComponent(x[4])+'">🗺 길찾기</a></div>');
      iw.setPosition(new kakao.maps.LatLng(c.lat,c.lng)); iw.open(map);
    };
    const ov=new kakao.maps.CustomOverlay({position:new kakao.maps.LatLng(c.lat,c.lng),content:el,yAnchor:0.5,xAnchor:0,clickable:true});
    ov.setMap(map); overlays.push(ov); pts.push([c.lat,c.lng]);
  }
  cntEl.textContent=curGu+' · '+pts.length+'/'+list.length+'곳';
  fit(pts);
}
function loadApts(){
  const my=++job, list=filt().filter(x=>x[2]===curGu);
  drawApts();
  const todo=list.filter(x=>!(x[4] in cache));
  if(!todo.length){prog.style.display='none';return;}
  let i=0;
  (function step(){
    if(my!==job) return;
    if(i>=todo.length){prog.style.display='none';localStorage.setItem(CK,JSON.stringify(cache));drawApts();return;}
    prog.style.display='block'; prog.textContent=curGu+' 위치 확인 중… '+(i+1)+'/'+todo.length;
    const x=todo[i]; i++;
    geocoder.addressSearch(x[4],(res,st)=>{
      cache[x[4]]=(st===kakao.maps.services.Status.OK&&res[0])?{lat:+res[0].y,lng:+res[0].x}:null;
      drawApts(); setTimeout(step,60);
    });
  })();
}
document.getElementById('grab').onclick=function(){
  if(!geocoder){alert('지도 로딩 후 눌러주세요');return;}
  const todo=REC.filter(x=>!(x[4] in cache));
  if(!todo.length){ dl(); return; }
  let i=0;
  (function step(){
    if(i>=todo.length){ prog.style.display='none'; localStorage.setItem(CK,JSON.stringify(cache)); dl(); return; }
    prog.style.display='block';
    prog.textContent='📥 전체 좌표 수집 중… '+(i+1)+'/'+todo.length+'  (끝나면 파일이 자동 저장됩니다)';
    const x=todo[i]; i++;
    geocoder.addressSearch(x[4],(res,st)=>{
      cache[x[4]]=(st===kakao.maps.services.Status.OK&&res[0])?{lat:+res[0].y,lng:+res[0].x}:null;
      if(i%25===0) localStorage.setItem(CK,JSON.stringify(cache));
      setTimeout(step,60);
    });
  })();
  function dl(){
    const ok=Object.values(cache).filter(v=>v&&v.lat).length;
    const blob=new Blob([JSON.stringify(cache)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='좌표.json'; a.click();
    alert('좌표 수집 완료!\n찾은 곳: '+ok+' / '+REC.length+'\n\n다운로드된 [좌표.json] 파일을 클로드에게 주세요.');
  }
};
backBtn.onclick=loadGu;
regSel.onchange=loadGu;
gbSel.onchange=()=>{ curGu?loadApts():loadGu(); };
window.__boot=function(){
  try{
    kakao.maps.load(function(){
      map=new kakao.maps.Map(document.getElementById('map'),{center:new kakao.maps.LatLng(37.55,127.0),level:9});
      geocoder=new kakao.maps.services.Geocoder();
      iw=new kakao.maps.InfoWindow({removable:true});
      loadGu();
    });
  }catch(e){ document.getElementById('err').style.display='flex'; }
};
if(window.__sdkok) window.__boot();
setTimeout(function(){ if(!window.kakao||!window.kakao.maps||!map){ document.getElementById('err').style.display='flex'; } },6000);
</script>
